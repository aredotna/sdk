name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (for example v0.7.1)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag to publish
        id: publish_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v*) ;;
            *)
              echo "Tag must start with v: $TAG"
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.publish_meta.outputs.tag }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for PACKAGE_DIR in packages/sdk packages/react-query; do
            NAME="$(node -p "require('./${PACKAGE_DIR}/package.json').name")"
            VERSION="$(node -p "require('./${PACKAGE_DIR}/package.json').version")"
            if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "${NAME}@${VERSION} already published"
            else
              echo "Publishing ${NAME}@${VERSION}"
              npm publish "./${PACKAGE_DIR}" --access public --ignore-scripts
            fi
          done

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.publish_meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub Release already exists for ${{ steps.publish_meta.outputs.tag }}"
          else
            gh release create "${{ steps.publish_meta.outputs.tag }}" --generate-notes
          fi
