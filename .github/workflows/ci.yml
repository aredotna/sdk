name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 12 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen
      - run: git diff --exit-code -- packages/sdk/src/generated
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  openapi-drift:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:fetch
      - run: pnpm gen
      - run: git diff --exit-code -- spec/openapi.json packages/sdk/src/generated
